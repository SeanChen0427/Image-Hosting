<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一頁式網頁專用圖床小幫手 - 熊恩Sean 課程專屬</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 引入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ============================================================================
    // 💡 提示：如果您懂一點代碼，可以將您的 ImgBB API Key 貼在下方雙引號內
    // 申請網址: https://api.imgbb.com/ (註冊登入後點擊 Add API key 即可免費取得)
    // ============================================================================
    const DEFAULT_IMGBB_API_KEY = ""; 

    // 自訂 Icon 元件
    const Icon = ({ name, size = 24, className = '' }) => {
      const spanRef = useRef(null);
      useEffect(() => {
        if (spanRef.current && window.lucide && window.lucide.icons[name]) {
          spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
          window.lucide.createIcons({
            icons: { [name]: window.lucide.icons[name] },
            nameAttr: 'data-lucide',
            root: spanRef.current,
            attrs: { width: size, height: size }
          });
        }
      }, [name, size]);
      return <span ref={spanRef} className={`inline-flex items-center justify-center ${className}`}></span>;
    };

    // 圖片壓縮工具函式
    const compressImage = (file) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            // 設定最大寬度，避免超大解析度影響開啟速度 (例如銷售頁不需要 4000px 的圖)
            const MAX_WIDTH = 1920; 
            if (width > MAX_WIDTH) {
              height = Math.round((height * MAX_WIDTH) / width);
              width = MAX_WIDTH;
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // 使用 jpeg 格式並設定品質為 0.8 (通常可減少 70-80% 體積而肉眼難辨差異)
            canvas.toBlob((blob) => {
              // 如果壓縮後的檔案沒有比較小，就用原檔 (防禦性邏輯)
              if (blob && blob.size < file.size) {
                const compressedFile = new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".jpg", {
                  type: 'image/jpeg',
                  lastModified: Date.now(),
                });
                resolve({ file: compressedFile, ratio: Math.round((1 - blob.size / file.size) * 100) });
              } else {
                resolve({ file: file, ratio: 0 });
              }
            }, 'image/jpeg', 0.8);
          };
        };
      });
    };

    function App() {
      const [images, setImages] = useState([]);
      const [isDragging, setIsDragging] = useState(false);
      const [apiKey, setApiKey] = useState(DEFAULT_IMGBB_API_KEY);
      const [showSettings, setShowSettings] = useState(!DEFAULT_IMGBB_API_KEY);
      const fileInputRef = useRef(null);

      const copyToClipboard = (text, id) => {
        const fallbackCopy = () => {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          textArea.style.position = "fixed";
          textArea.style.opacity = "0";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          try {
            document.execCommand('copy');
            handleCopySuccess(id);
          } catch (err) {
            alert('複製失敗，請手動複製網址。');
          }
          document.body.removeChild(textArea);
        };

        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text)
            .then(() => handleCopySuccess(id))
            .catch(() => fallbackCopy());
        } else {
          fallbackCopy();
        }
      };

      const handleCopySuccess = (id) => {
        setImages(prev => prev.map(img => img.id === id ? { ...img, copied: true } : img));
        setTimeout(() => {
          setImages(prev => prev.map(img => img.id === id ? { ...img, copied: false } : img));
        }, 2000);
      };

      const uploadImageToImgBB = async (file, id) => {
        if (!apiKey) return;

        const formData = new FormData();
        formData.append('image', file);
        
        try {
          const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
            method: 'POST',
            body: formData,
          });
          const data = await response.json();
          if (data.success) {
            setImages(prev => prev.map(img => img.id === id ? { 
              ...img, 
              status: 'success', 
              directUrl: data.data.url,
              finalSize: (file.size / 1024).toFixed(1) + ' KB'
            } : img));
          } else {
            throw new Error(data.error?.message || '上傳失敗');
          }
        } catch (error) {
          setImages(prev => prev.map(img => img.id === id ? { 
            ...img, 
            status: 'error', 
            errorMsg: error.message 
          } : img));
        }
      };

      const processFiles = async (files) => {
        const imageFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
        if (imageFiles.length === 0) return;

        const newEntries = imageFiles.map(file => {
          const id = Math.random().toString(36).substr(2, 9);
          return {
            id,
            originalName: file.name,
            originalSize: (file.size / 1024).toFixed(1) + ' KB',
            preview: URL.createObjectURL(file),
            status: 'compressing',
            directUrl: '',
            errorMsg: '',
            copied: false,
            reduction: 0
          };
        });

        setImages(prev => [...newEntries, ...prev]);

        // 逐一進行壓縮與上傳
        for (let i = 0; i < imageFiles.length; i++) {
          const file = imageFiles[i];
          const entryId = newEntries[i].id;

          const { file: compressedFile, ratio } = await compressImage(file);
          
          setImages(prev => prev.map(img => img.id === entryId ? { 
            ...img, 
            status: 'uploading',
            reduction: ratio
          } : img));

          uploadImageToImgBB(compressedFile, entryId);
        }
      };

      const onDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
      const onDragLeave = (e) => { e.preventDefault(); setIsDragging(false); };
      const onDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        if (e.dataTransfer.files) processFiles(e.dataTransfer.files);
      };

      useEffect(() => {
        const handlePaste = (e) => {
          if (e.clipboardData.files.length > 0) processFiles(e.clipboardData.files);
        };
        window.addEventListener('paste', handlePaste);
        return () => window.removeEventListener('paste', handlePaste);
      }, [apiKey]);

      return (
        <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
          <div className="w-full max-w-4xl space-y-6">
            
            {/* Header - 品牌識別 */}
            <div className="text-center space-y-4 mb-8">
              <div className="inline-flex items-center justify-center mb-2">
                <img 
                  src="https://i.ibb.co/35mStRnx/Gemini-Generated-Image-8xg52z8xg52z8xg5.jpg" 
                  alt="熊恩Sean Logo" 
                  className="w-24 h-24 rounded-full shadow-lg object-cover border-4 border-white"
                />
              </div>
              <div className="animate-fade-in">
                <span className="text-xs font-black text-indigo-700 tracking-widest bg-indigo-100 inline-block px-4 py-1.5 rounded-full uppercase">
                  熊恩Sean 社群經營 x AI實戰 課程專屬
                </span>
              </div>
              <h1 className="text-3xl md:text-4xl font-extrabold text-slate-800 tracking-tight">銷售頁圖床小幫手</h1>
              <p className="text-slate-500 max-w-md mx-auto text-sm md:text-base">自動壓縮優化圖片，提升銷售頁開啟速度。上傳完成後即可獲得永久直連網址。</p>
            </div>

            {/* API Key 設定 */}
            {showSettings && (
              <div className="bg-amber-50 border border-amber-200 rounded-2xl p-6 shadow-sm ring-1 ring-amber-200/50">
                <div className="flex items-start gap-4">
                  <div className="bg-amber-100 p-2 rounded-lg text-amber-600">
                    <Icon name="key" size={24} />
                  </div>
                  <div className="flex-1 space-y-3">
                    <h3 className="font-bold text-amber-900 text-lg">初次使用請設定您的 API Key</h3>
                    <p className="text-amber-800 text-sm leading-relaxed">
                      請至 <a href="https://api.imgbb.com/" target="_blank" className="underline font-bold text-indigo-600 hover:text-indigo-800">ImgBB API 官網</a> 註冊並點擊 <b>Add API key</b> 取得專屬金鑰。這能確保您的圖片獲得穩定的永久存放空間。
                    </p>
                    <div className="flex flex-col sm:flex-row gap-2">
                      <input 
                        type="text" 
                        value={apiKey}
                        onChange={(e) => setApiKey(e.target.value)}
                        placeholder="請貼上您的 ImgBB API Key..."
                        className="flex-1 px-4 py-3 rounded-xl border border-amber-300 focus:ring-2 focus:ring-indigo-500 outline-none bg-white text-slate-700 font-mono text-xs md:text-sm transition-all"
                      />
                      <button 
                        onClick={() => apiKey.trim() && setShowSettings(false)}
                        className="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-all shadow-md active:scale-95"
                      >
                        儲存並開始上傳
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* 上傳區 */}
            {!showSettings && (
              <div 
                onDragOver={onDragOver}
                onDragLeave={onDragLeave}
                onDrop={onDrop}
                onClick={() => fileInputRef.current?.click()}
                className={`
                  relative group cursor-pointer border-2 border-dashed rounded-[2rem] p-12 md:p-20 text-center transition-all duration-300
                  ${isDragging ? 'border-indigo-500 bg-indigo-50 scale-[1.01] shadow-xl ring-4 ring-indigo-500/10' : 'border-slate-300 hover:border-indigo-400 bg-white shadow-sm hover:shadow-md'}
                `}
              >
                <input type="file" ref={fileInputRef} onChange={(e) => processFiles(e.target.files)} className="hidden" multiple accept="image/*" />
                <div className="space-y-5">
                  <div className={`mx-auto w-20 h-20 rounded-3xl flex items-center justify-center transition-all duration-500 ${isDragging ? 'bg-indigo-600 text-white rotate-12' : 'bg-slate-100 text-slate-400 group-hover:bg-indigo-100 group-hover:text-indigo-600'}`}>
                    <Icon name="upload-cloud" size={44} />
                  </div>
                  <div>
                    <h3 className="text-xl font-bold text-slate-700 mb-1">將圖片拖曳至此，或點擊選取</h3>
                    <p className="text-slate-400 text-sm">支援多圖上傳 • 支援 <strong>Ctrl + V</strong> 貼上截圖</p>
                  </div>
                  <div className="inline-flex items-center gap-2 px-4 py-1.5 bg-green-50 text-green-700 rounded-full text-xs font-bold ring-1 ring-green-100">
                    <Icon name="zap" size={14} /> 內建智慧壓縮技術
                  </div>
                </div>
              </div>
            )}

            {/* 列表區 */}
            {images.length > 0 && (
              <div className="space-y-4">
                <div className="flex justify-between items-center px-2">
                  <h3 className="font-bold text-slate-700 flex items-center gap-2">
                    <Icon name="layout-list" size={20} className="text-indigo-500" />
                    處理列表 ({images.length})
                  </h3>
                  <button onClick={() => setImages([])} className="text-xs font-bold text-slate-400 hover:text-red-500 transition-colors uppercase tracking-wider">清空列表</button>
                </div>
                
                <div className="grid gap-4">
                  {images.map(img => (
                    <div key={img.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col sm:flex-row gap-4 items-center group animate-in slide-in-from-bottom-2 duration-300">
                      <div className="w-24 h-24 flex-shrink-0 rounded-xl overflow-hidden bg-slate-50 border border-slate-100 relative shadow-inner">
                        <img src={img.preview} className="w-full h-full object-cover" />
                        {(img.status === 'uploading' || img.status === 'compressing') && (
                          <div className="absolute inset-0 bg-white/80 flex flex-col items-center justify-center backdrop-blur-[2px]">
                            <Icon name="loader-2" size={24} className="animate-spin text-indigo-600" />
                            <span className="text-[10px] font-bold mt-1 text-indigo-600">{img.status === 'compressing' ? '壓縮中' : '上傳中'}</span>
                          </div>
                        )}
                      </div>

                      <div className="flex-1 w-full min-w-0 space-y-2.5">
                        <div className="flex justify-between items-start">
                          <div className="min-w-0">
                            <p className="font-bold text-slate-800 truncate text-sm">{img.originalName}</p>
                            <div className="flex items-center gap-2 mt-0.5">
                              <span className="text-[10px] px-1.5 py-0.5 bg-slate-100 text-slate-500 rounded font-medium">{img.originalSize}</span>
                              {img.reduction > 0 && (
                                <span className="text-[10px] px-1.5 py-0.5 bg-green-100 text-green-600 rounded font-bold">已縮減 {img.reduction}% 體積</span>
                              )}
                            </div>
                          </div>
                          <button onClick={() => setImages(prev => prev.filter(i => i.id !== img.id))} className="text-slate-300 hover:text-red-500 p-1.5 hover:bg-red-50 rounded-lg transition-all">
                            <Icon name="trash-2" size={16} />
                          </button>
                        </div>

                        {img.status === 'success' && (
                          <div className="flex gap-2 items-center">
                            <div className="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-2.5 font-mono text-[11px] text-slate-500 truncate select-all">
                              {img.directUrl}
                            </div>
                            <button 
                              onClick={() => copyToClipboard(img.directUrl, img.id)}
                              className={`flex items-center justify-center gap-1.5 px-5 py-2.5 rounded-xl text-sm font-bold transition-all flex-shrink-0 min-w-[100px]
                                ${img.copied ? 'bg-green-500 text-white shadow-lg shadow-green-200' : 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg shadow-indigo-100 active:scale-95'}`}
                            >
                              {img.copied ? <Icon name="check" size={16} /> : <Icon name="copy" size={16} />}
                              {img.copied ? '已複製' : '複製網址'}
                            </button>
                          </div>
                        )}
                        
                        {img.status === 'error' && <p className="text-xs font-bold text-red-500 bg-red-50 p-2 rounded-lg border border-red-100 inline-block">{img.errorMsg}</p>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Footer / Social Links */}
            <div className="mt-16 pt-10 border-t border-slate-200/60 flex flex-col items-center space-y-10 pb-12">
              <div className="flex flex-col items-center space-y-6">
                <p className="text-sm font-bold text-slate-400 uppercase tracking-[0.2em]">Connect with Sean</p>
                <div className="flex flex-wrap justify-center gap-4">
                  <SocialLink href="https://www.instagram.com/c.ksean?igsh=MTVlbHV1a3QwY3duZQ%3D%3D&utm_source=qr" icon="instagram" label="Instagram" color="hover:text-pink-600 hover:bg-pink-50 hover:border-pink-200" />
                  <SocialLink href="https://www.facebook.com/share/1DxJxYMQKX/?mibextid=wwXIfr" icon="facebook" label="Facebook" color="hover:text-blue-600 hover:bg-blue-50 hover:border-blue-200" />
                  <SocialLink href="https://www.threads.com/@c.ksean?igshid=NTc4MTIwNjQ2YQ==" icon="at-sign" label="Threads" color="hover:text-black hover:bg-slate-100 hover:border-slate-300" />
                  <SocialLink href="https://lin.ee/oDg90C1" icon="message-circle" label="LINE" color="hover:text-green-600 hover:bg-green-50 hover:border-green-200" />
                </div>
              </div>
              <div className="text-center">
                <p className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">© 熊恩Sean • AI 實戰教學系列工具</p>
              </div>
            </div>

          </div>
        </div>
      );
    }

    const SocialLink = ({ href, icon, label, color }) => (
      <a href={href} target="_blank" rel="noopener noreferrer" 
         className={`flex items-center gap-2.5 px-6 py-3 rounded-2xl bg-white border border-slate-200 text-slate-600 transition-all duration-300 shadow-sm font-bold text-sm ${color}`}>
        <Icon name={icon} size={20} /> {label}
      </a>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
