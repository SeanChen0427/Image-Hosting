<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一頁式網頁專用圖床小幫手</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 引入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ============================================================================
    // 💡 提示：如果您懂一點代碼，可以將您的 ImgBB API Key 貼在下方雙引號內
    // 申請網址: https://api.imgbb.com/ (註冊登入後點擊 Add API key 即可免費取得)
    // 這樣下次打開網頁就不用重新輸入了！
    // ============================================================================
    const DEFAULT_IMGBB_API_KEY = ""; // <--- 將您的 Key 貼在雙引號裡面，例如 "1234567890abcdef..."

    // 自訂 Icon 元件 (安全隔離 React 與 Lucide)
    const Icon = ({ name, size = 24, className = '' }) => {
      const spanRef = useRef(null);
      useEffect(() => {
        if (spanRef.current && window.lucide && window.lucide.icons[name]) {
          spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
          window.lucide.createIcons({
            icons: { [name]: window.lucide.icons[name] },
            nameAttr: 'data-lucide',
            root: spanRef.current,
            attrs: { width: size, height: size }
          });
        }
      }, [name, size]);
      return <span ref={spanRef} className={`inline-flex items-center justify-center ${className}`}></span>;
    };

    function App() {
      const [images, setImages] = useState([]);
      const [isDragging, setIsDragging] = useState(false);
      const [apiKey, setApiKey] = useState(DEFAULT_IMGBB_API_KEY);
      const [showSettings, setShowSettings] = useState(!DEFAULT_IMGBB_API_KEY);
      const fileInputRef = useRef(null);

      // 複製文字功能 (相容 iframe 與嚴格的安全策略)
      const copyToClipboard = (text, id) => {
        const fallbackCopy = () => {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          // 確保不可見且不影響排版
          textArea.style.position = "fixed";
          textArea.style.top = "0";
          textArea.style.left = "0";
          textArea.style.opacity = "0";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          try {
            document.execCommand('copy');
            handleCopySuccess(id);
          } catch (err) {
            console.error('Fallback copy failed', err);
            alert('複製失敗，請手動選取網址文字複製。');
          }
          document.body.removeChild(textArea);
        };

        // 嘗試使用現代 Clipboard API，若被阻擋 (NotAllowedError) 則切換至備用方案
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text)
            .then(() => handleCopySuccess(id))
            .catch(() => fallbackCopy());
        } else {
          fallbackCopy();
        }
      };

      const handleCopySuccess = (id) => {
        setImages(prev => prev.map(img => img.id === id ? { ...img, copied: true } : img));
        setTimeout(() => {
          setImages(prev => prev.map(img => img.id === id ? { ...img, copied: false } : img));
        }, 2000);
      };

      // 處理圖片上傳核心邏輯
      const uploadImageToImgBB = async (file, id) => {
        if (!apiKey) {
          setImages(prev => prev.map(img => img.id === id ? { ...img, status: 'error', errorMsg: '未設定 API Key' } : img));
          return;
        }

        const formData = new FormData();
        formData.append('image', file);
        
        try {
          const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
            method: 'POST',
            body: formData,
          });
          
          const data = await response.json();
          
          if (data.success) {
            setImages(prev => prev.map(img => img.id === id ? { 
              ...img, 
              status: 'success', 
              directUrl: data.data.url, // 取得永久直連網址
              thumbUrl: data.data.thumb.url 
            } : img));
          } else {
            throw new Error(data.error?.message || '上傳失敗');
          }
        } catch (error) {
          setImages(prev => prev.map(img => img.id === id ? { 
            ...img, 
            status: 'error', 
            errorMsg: error.message 
          } : img));
        }
      };

      // 處理檔案加入清單並開始上傳
      const processFiles = (files) => {
        const imageFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
        
        if (imageFiles.length === 0) {
          alert('請上傳圖片檔案 (JPG, PNG, GIF 等)');
          return;
        }

        const newImages = imageFiles.map(file => {
          const id = Math.random().toString(36).substr(2, 9);
          const preview = URL.createObjectURL(file);
          
          // 啟動上傳
          uploadImageToImgBB(file, id);
          
          return {
            id,
            file,
            preview,
            status: 'uploading', // 'uploading', 'success', 'error'
            directUrl: '',
            thumbUrl: '',
            errorMsg: '',
            copied: false
          };
        });

        setImages(prev => [...newImages, ...prev]);
      };

      // 拖曳事件處理
      const onDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
      const onDragLeave = (e) => { e.preventDefault(); setIsDragging(false); };
      const onDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          processFiles(e.dataTransfer.files);
        }
      };

      // 貼上事件處理 (支援 Ctrl+V)
      useEffect(() => {
        const handlePaste = (e) => {
          if (e.clipboardData.files && e.clipboardData.files.length > 0) {
            processFiles(e.clipboardData.files);
          }
        };
        window.addEventListener('paste', handlePaste);
        return () => window.removeEventListener('paste', handlePaste);
      }, [apiKey]);

      // 點擊選擇檔案
      const handleFileSelect = (e) => {
        if (e.target.files && e.target.files.length > 0) {
          processFiles(e.target.files);
          e.target.value = ''; // 重置 input
        }
      };

      const removeImage = (id) => {
        setImages(prev => prev.filter(img => img.id !== id));
      };

      return (
        <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
          <div className="w-full max-w-4xl space-y-6">
            
            {/* Header */}
            <div className="text-center space-y-3 mb-8">
              <div className="inline-flex items-center justify-center mb-2">
                <img 
                  src="https://i.ibb.co/YBKgnKfC/Gemini-Generated-Image-8xg52z8xg52z8xg5.png" 
                  alt="熊恩Sean Logo" 
                  className="w-24 h-24 rounded-full shadow-md object-cover border-4 border-white"
                />
              </div>
              <div>
                <span className="text-sm font-bold text-indigo-600 tracking-wide bg-indigo-50 inline-block px-4 py-1.5 rounded-full">
                  熊恩Sean 社群經營 x AI實戰 課程
                </span>
              </div>
              <h1 className="text-3xl font-bold text-slate-800">銷售頁圖床小幫手</h1>
              <p className="text-slate-500">將圖片拖曳至此，立即產生永久有效的網頁圖片連結</p>
            </div>

            {/* API Key 設定區塊 (只有在沒設定時才會顯示) */}
            {showSettings && (
              <div className="bg-amber-50 border border-amber-200 rounded-2xl p-6 shadow-sm">
                <div className="flex items-start gap-3">
                  <Icon name="settings" className="text-amber-500 mt-1" size={24} />
                  <div className="flex-1 space-y-3">
                    <h3 className="font-bold text-amber-900 text-lg">初次使用請設定您的圖床 API Key</h3>
                    <p className="text-amber-800 text-sm">
                      請先至 <a href="https://api.imgbb.com/" target="_blank" className="underline font-bold text-indigo-600 hover:text-indigo-800">ImgBB API 官網</a> 免費註冊並取得您的專屬 API Key，複製並填入下方即可啟用。
                      <br/>(只需設定一次，即可永久免費且無限制地上傳圖片)
                    </p>
                    <div className="flex gap-2">
                      <input 
                        type="text" 
                        value={apiKey}
                        onChange={(e) => setApiKey(e.target.value)}
                        placeholder="請貼上您的 ImgBB API Key..."
                        className="flex-1 px-4 py-2 rounded-lg border border-amber-300 focus:ring-2 focus:ring-amber-500 outline-none bg-white text-slate-700 font-mono text-sm"
                      />
                      <button 
                        onClick={() => {
                          if (apiKey.trim()) {
                            setShowSettings(false);
                            alert("設定完成！您可以開始上傳圖片了。\n\n(提示：如果您懂一點 HTML，也可以將 Key 寫入原始碼的 DEFAULT_IMGBB_API_KEY 變數中，以後就不用再輸入囉！)");
                          }
                        }}
                        className="px-6 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-lg font-medium transition-colors"
                      >
                        儲存並啟用
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* 上傳拖曳區 */}
            {!showSettings && (
              <div 
                onDragOver={onDragOver}
                onDragLeave={onDragLeave}
                onDrop={onDrop}
                onClick={() => fileInputRef.current?.click()}
                className={`
                  relative overflow-hidden group cursor-pointer border-2 border-dashed rounded-3xl p-10 md:p-16 text-center transition-all duration-200 ease-in-out
                  ${isDragging ? 'border-indigo-500 bg-indigo-50/50 scale-[1.02]' : 'border-slate-300 hover:border-indigo-400 hover:bg-slate-50 bg-white'}
                `}
              >
                <input 
                  type="file" 
                  ref={fileInputRef} 
                  onChange={handleFileSelect} 
                  className="hidden" 
                  multiple 
                  accept="image/*" 
                />
                <div className="space-y-4 pointer-events-none">
                  <div className={`mx-auto w-20 h-20 rounded-full flex items-center justify-center transition-colors ${isDragging ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-100 text-slate-400 group-hover:bg-indigo-50 group-hover:text-indigo-500'}`}>
                    <Icon name="image-plus" size={40} />
                  </div>
                  <h3 className="text-xl font-bold text-slate-700">點擊選擇圖片，或直接拖曳圖片至此</h3>
                  <p className="text-slate-400 text-sm">
                    支援 JPG, PNG, GIF 格式 • 支援 <strong>Ctrl + V</strong> 直接貼上截圖
                  </p>
                </div>
              </div>
            )}

            {/* 上傳結果列表 */}
            {images.length > 0 && (
              <div className="space-y-4 mt-8">
                <h3 className="font-semibold text-slate-700 flex items-center gap-2 px-2">
                  <Icon name="list" size={20} />
                  上傳記錄 ({images.length})
                </h3>
                
                <div className="grid gap-4">
                  {images.map(img => (
                    <div key={img.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col sm:flex-row gap-4 items-center group">
                      
                      {/* 預覽圖 */}
                      <div className="w-24 h-24 flex-shrink-0 rounded-xl overflow-hidden bg-slate-100 border border-slate-200 relative flex items-center justify-center">
                        <img src={img.preview} alt="preview" className="w-full h-full object-cover" />
                        {img.status === 'uploading' && (
                          <div className="absolute inset-0 bg-white/70 flex items-center justify-center backdrop-blur-sm">
                            <Icon name="loader-2" size={24} className="animate-spin text-indigo-600" />
                          </div>
                        )}
                      </div>

                      {/* 資訊與網址 */}
                      <div className="flex-1 w-full min-w-0 space-y-2">
                        <div className="flex justify-between items-start">
                          <p className="font-medium text-slate-700 truncate text-sm" title={img.file.name}>
                            {img.file.name}
                          </p>
                          <button onClick={() => removeImage(img.id)} className="text-slate-400 hover:text-red-500 p-1 rounded-md hover:bg-red-50 transition-colors">
                            <Icon name="x" size={16} />
                          </button>
                        </div>

                        {img.status === 'uploading' && (
                          <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                            <div className="bg-indigo-500 h-2.5 rounded-full w-full animate-pulse"></div>
                          </div>
                        )}

                        {img.status === 'error' && (
                          <p className="text-sm text-red-500 flex items-center gap-1">
                            <Icon name="alert-circle" size={14} /> {img.errorMsg}
                          </p>
                        )}

                        {img.status === 'success' && (
                          <div className="flex gap-2 items-center">
                            <div className="flex-1 bg-slate-50 border border-slate-200 rounded-lg p-2 font-mono text-xs text-slate-600 truncate">
                              {img.directUrl}
                            </div>
                            <button 
                              onClick={() => copyToClipboard(img.directUrl, img.id)}
                              className={`flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-medium transition-all flex-shrink-0
                                ${img.copied 
                                  ? 'bg-green-100 text-green-700 border border-green-200' 
                                  : 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-sm'
                                }`}
                            >
                              {img.copied ? <Icon name="check-check" size={16} /> : <Icon name="copy" size={16} />}
                              {img.copied ? '已複製' : '複製網址'}
                            </button>
                          </div>
                        )}
                      </div>

                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Footer & 社群連結 */}
            <div className="w-full mt-16 pt-8 border-t border-slate-200 flex flex-col items-center space-y-8 pb-8">
              
              {/* 熊恩Sean 社群按鈕區塊 */}
              <div className="flex flex-col items-center space-y-4">
                <p className="text-sm font-medium text-slate-500">追蹤 熊恩Sean，獲取更多社群經營與 AI 實戰技巧 👇</p>
                <div className="flex flex-wrap justify-center gap-3">
                  <a href="https://www.instagram.com/c.ksean?igsh=MTVlbHV1a3QwY3duZQ%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer" 
                    className="flex items-center gap-2 px-5 py-2.5 rounded-full bg-white border border-slate-200 text-slate-600 hover:text-pink-600 hover:border-pink-300 hover:bg-pink-50 transition-all shadow-sm text-sm font-medium">
                    <Icon name="instagram" size={18} /> Instagram
                  </a>
                  
                  <a href="https://www.facebook.com/share/1DxJxYMQKX/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" 
                    className="flex items-center gap-2 px-5 py-2.5 rounded-full bg-white border border-slate-200 text-slate-600 hover:text-blue-600 hover:border-blue-300 hover:bg-blue-50 transition-all shadow-sm text-sm font-medium">
                    <Icon name="facebook" size={18} /> Facebook
                  </a>
                  
                  <a href="https://www.threads.com/@c.ksean?igshid=NTc4MTIwNjQ2YQ==" target="_blank" rel="noopener noreferrer" 
                    className="flex items-center gap-2 px-5 py-2.5 rounded-full bg-white border border-slate-200 text-slate-600 hover:text-slate-900 hover:border-slate-400 hover:bg-slate-100 transition-all shadow-sm text-sm font-medium">
                    <Icon name="at-sign" size={18} /> Threads
                  </a>
                  
                  <a href="https://lin.ee/oDg90C1" target="_blank" rel="noopener noreferrer" 
                    className="flex items-center gap-2 px-5 py-2.5 rounded-full bg-white border border-slate-200 text-slate-600 hover:text-green-600 hover:border-green-300 hover:bg-green-50 transition-all shadow-sm text-sm font-medium">
                    <Icon name="message-circle" size={18} /> LINE 官方
                  </a>
                </div>
              </div>

              {/* 系統說明 */}
              <div className="text-center text-slate-400 text-xs space-y-1">
                <p>產生的圖片連結可直接用於 HTML <code>&lt;img src="..."&gt;</code> 標籤或銷售頁建站工具</p>
                <p>Powered by ImgBB API</p>
              </div>

            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
