: 32px;\n  display: flex;\n  flex-direction: column;\n  gap: 12px;\n  z-index: 999;\n}\n.float-btn {\n  width: 52px; height: 52px;\n  border-radius: 50%;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  text-decoration: none;\n  box-shadow: 0 4px 16px rgba(0,0,0,.2);\n  transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;\n  position: relative;\n  animation: floatY2 3.5s ease-in-out infinite;\n}\n.float-btn:nth-child(2) { animation-delay:.6s; }\n.float-btn:hover { transform: translateY(-4px) scale(1.1) !important; box-shadow: 0 8px 24px rgba(0,0,0,.25); animation:none; }\n.float-line { background: #06C755; }\n.float-ig { background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }\n.float-tip {\n  position: absolute;\n  right: calc(100% + 10px);\n  top: 50%;\n  transform: translateY(-50%);\n  background: #3D2C1E;\n  color: white;\n  font-family: 'Noto Sans TC', sans-serif;\n  font-size: 12px;\n  font-weight: 500;\n  white-space: nowrap;\n  padding: 5px 10px;\n  border-radius: 8px;\n  pointer-events: none;\n  opacity: 0;\n  transition: opacity .2s;\n}\n.float-tip::after { content:'';position:absolute;left:100%;top:50%;transform:translateY(-50%);border:5px solid transparent;border-left-color:#3D2C1E; }\n.float-btn:hover .float-tip { opacity:1; }\n\n@media(min-width:768px){\n  .float-btns { right:24px; bottom:40px; }\n  .float-btn { width:56px; height:56px; }\n}\n<\/style>\n\n\n</head><body>\n\n<!-- \u2500\u2500 HERO \u2500\u2500 -->\n<section class=\"hero\">\n  <img class=\"hero-img\" src=\"5c282d48-f644-45bb-8b27-8039bd1ee1e7\" alt=\"\u6d6a\u611b\u958b\u59cb - \u89aa\u5b50\u516c\u76ca\u8ab2\u7a0b\">\n  <div class=\"hero-img-overlay\"></div>\n\n  <div class=\"hero-paws\" aria-hidden=\"true\">\n    <span class=\"paw\">\ud83d\udc3e</span>\n    <span class=\"paw\">\ud83d\udc3e</span>\n    <span class=\"paw\">\ud83d\udc3e</span>\n    <span class=\"paw\">\ud83d\udc3e</span>\n    <span class=\"paw\">\ud83d\udc3e</span>\n  </div>\n\n  <div class=\"hero-bottom\">\n    <div class=\"hero-cta\">\n      <a href=\"#register\" class=\"btn-primary\">\u7acb\u5373\u5831\u540d \ud83d\udc3e</a>\n      <a href=\"#about\" class=\"btn-outline\">\u4e86\u89e3\u66f4\u591a</a>\n    </div>\n  </div>\n\n  <div class=\"scroll-hint\" aria-hidden=\"true\" style=\"bottom:8px;\">\n    <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M8 3v10M4 9l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n  </div>\n</section>\n\n<!-- wave -->\n<div class=\"wave\" style=\"background:#3D2C1E;\">\n  <svg viewBox=\"0 0 1440 60\" preserveAspectRatio=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n    <path d=\"M0,0 C360,60 1080,60 1440,0 L1440,60 L0,60 Z\" fill=\"#FFF8EF\"></path>\n  </svg>\n</div>\n\n<!-- \u2500\u2500 ABOUT \u2500\u2500 -->\n<section class=\"section about\" id=\"about\">\n  <div class=\"section-inner\">\n    <div class=\"fade-in\">\n      <div class=\"section-label\">\u95dc\u65bc\u6d3b\u52d5</div>\n      <h2 class=\"section-title\">\u6709\u8a31\u591a\u72d7\u72d7\u5728\u7b49\u5f85<br>\u4e00\u500b\u9858\u610f\u4f38\u51fa\u624b\u7684\u4eba \ud83d\udc36</h2>\n    </div>\n\n    <div class=\"about-text fade-in\">\n      <p>\u9019\u4e00\u6b21\uff0c\u6211\u5011\u9080\u8acb\u5b69\u5b50\u4e00\u8d77\u8d70\u9032\u6545\u4e8b\u88e1\u3002\u900f\u904e\u6eab\u6696\u7684\u7e6a\u672c\uff0c\u8b93\u5b69\u5b50\u7406\u89e3\u6d41\u6d6a\u52d5\u7269\u7684\u751f\u547d\u6545\u4e8b\uff0c\u5b78\u7fd2<strong>\u540c\u7406\u5fc3</strong>\u8207<strong>\u611b\u7684\u884c\u52d5</strong>\u3002</p>\n      <p>\u8ab2\u7a0b\u7d50\u5408\u6545\u4e8b\u5206\u4eab\u3001\u52d5\u624b\u505a\u6c23\u7403\u72d7\u72d7\uff0c\u4ee5\u53ca\u5f15\u5c0e\u5f0f\u4e92\u52d5\u8a0e\u8ad6\u2014\u2014\u8b93\u6bcf\u500b\u5b69\u5b50\u4e0d\u53ea\u662f\u807d\u6545\u4e8b\uff0c\u66f4\u80fd\u611f\u53d7\u300c<strong>\u539f\u4f86\u6211\u4e5f\u53ef\u4ee5\u5e6b\u52a9\u5225\u4eba</strong>\u300d\u7684\u6eab\u6696\u3002</p>\n      <p>\u8ab2\u7a0b\u6240\u6709\u6536\u5165\u5c07\u5168\u6578\u6350\u8d08\u7d66 <strong>\u793e\u5718\u6cd5\u4eba\u53f0\u5357\u5e02\u6d41\u6d6a\u52d5\u7269\u611b\u8b77\u5354\u6703</strong>\uff0c\u8b93\u5b69\u5b50\u7684\u53c3\u8207\u6210\u70ba\u771f\u5be6\u7684\u5584\u884c\u3002</p>\n    </div>\n\n    <div class=\"info-grid fade-in\">\n      <div class=\"info-card\">\n        <div class=\"info-icon\">\ud83d\uddd3</div>\n        <div>\n          <div class=\"info-label\">\u6d3b\u52d5\u6642\u9593</div>\n          <div class=\"info-value\">2025\u5e74 5\u670817\u65e5\uff08\u65e5\uff09<br>10:30 \u2013 12:00</div>\n        </div>\n      </div>\n      <div class=\"info-card\">\n        <div class=\"info-icon\">\ud83d\udccd</div>\n        <div>\n          <div class=\"info-label\">\u6d3b\u52d5\u5730\u9ede</div>\n          <div class=\"info-value\">\u661f\u969b\u840c\u5bf5\u7cbe\u54c1\u5bf5\u7269\u751f\u6d3b\u9928<small>\u81fa\u5357\u5e02\u4ec1\u5fb7\u5340\u6587\u5fe0\u8def85\u865f</small></div>\n        </div>\n      </div>\n      <div class=\"info-card\">\n        <div class=\"info-icon\">\ud83e\uddd2</div>\n        <div>\n          <div class=\"info-label\">\u9069\u5408\u5c0d\u8c61</div>\n          <div class=\"info-value\">3\uff5e8\u6b72\u5b69\u7ae5<small>\u5efa\u8b70\u89aa\u5b50\u4e00\u540c\u53c3\u8207</small></div>\n        </div>\n      </div>\n      <div class=\"info-card\">\n        <div class=\"info-icon\">\u26a0\ufe0f</div>\n        <div>\n          <div class=\"info-label\">\u540d\u984d\u8aaa\u660e</div>\n          <div class=\"info-value\">\u5c0f\u73ed\u5236\uff0c\u984d\u6eff\u5373\u6b62</div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- wave -->\n<div class=\"wave\" style=\"background:#FFFCF7;\">\n  <svg viewBox=\"0 0 1440 50\" preserveAspectRatio=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n    <path d=\"M0,50 C480,0 960,0 1440,50 L1440,0 L0,0 Z\" fill=\"#FFF8EF\"></path>\n  </svg>\n</div>\n\n<!-- \u2500\u2500 CONTENT \u2500\u2500 -->\n<section class=\"section content-section\" id=\"content\">\n  <div class=\"section-inner\">\n    <div class=\"fade-in\">\n      <div class=\"section-label\">\u8ab2\u7a0b\u5167\u5bb9</div>\n      <h2 class=\"section-title\">\u5b69\u5b50\u80fd\u5e36\u8d70\u7684<br>\u4e0d\u53ea\u662f\u4f5c\u54c1 \u2728</h2>\n    </div>\n\n    <div class=\"course-cards\">\n      <div class=\"course-card fade-in\">\n        <div class=\"course-num\">01</div>\n        <h3>\ud83d\udcd6 \u7e6a\u672c\u6545\u4e8b\u5206\u4eab</h3>\n        <p>\u7528\u5b69\u5b50\u80fd\u7406\u89e3\u7684\u65b9\u5f0f\uff0c\u8a8d\u8b58\u6d41\u6d6a\u52d5\u7269\u7684\u751f\u547d\u6545\u4e8b\uff0c\u5b78\u7fd2\u5c0a\u91cd\u8207\u73cd\u60dc\u6bcf\u4e00\u500b\u751f\u547d\u3002</p>\n      </div>\n      <div class=\"course-card fade-in\">\n        <div class=\"course-num\">02</div>\n        <h3>\ud83c\udf88 \u611b\u5fc3\u5ef6\u4f38\u6d3b\u52d5</h3>\n        <p>\u52d5\u624b\u6298\u51fa\u5c08\u5c6c\u7684\u300c\u6c23\u7403\u72d7\u72d7\u300d\uff0c\u628a\u6eab\u6696\u5e36\u56de\u5bb6\uff0c\u8b93\u5b69\u5b50\u7559\u4e0b\u5177\u9ad4\u7684\u4f5c\u54c1\u8a18\u61b6\u3002</p>\n      </div>\n      <div class=\"course-card fade-in\">\n        <div class=\"course-num\">03</div>\n        <h3>\ud83d\udcac \u4e92\u52d5\u8a0e\u8ad6</h3>\n        <p>\u5f15\u5c0e\u5b69\u5b50\u8868\u9054\u611f\u53d7\uff0c\u5b78\u7fd2\u95dc\u5fc3\u8207\u5c0a\u91cd\u751f\u547d\uff0c\u57f9\u990a\u8868\u9054\u60c5\u611f\u8207\u540c\u7406\u5fc3\u7684\u80fd\u529b\u3002</p>\n      </div>\n    </div>\n\n    <div class=\"takeaways fade-in\">\n      <h3>\u5b69\u5b50\u80fd\u5e36\u8d70\u7684 \u2726</h3>\n      <div class=\"takeaways-grid\">\n        <div class=\"takeaway\"><div class=\"takeaway-dot\">\u2713</div><span>\u4e00\u6b21\u540c\u7406\u751f\u547d\u7684\u5b78\u7fd2\u7d93\u9a57</span></div>\n        <div class=\"takeaway\"><div class=\"takeaway-dot\">\u2713</div><span>\u5c0d\u52d5\u7269\u6 e\"></circle></svg>\n    <span class=\"float-tip\">\u8ffd\u8e64 Instagram</span>\n  </a>\n</div>\n\n<!-- hidden iframe -->\n<iframe name=\"hidden_submit\" style=\"display:none;\" title=\"submit\"></iframe>\n\n<script>\n// \u2500\u2500\u2500 Scroll fade-in\nconst obs = new IntersectionObserver(entries => {\n  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });\n}, { threshold: 0.12 });\ndocument.querySelectorAll('.fade-in').forEach(el => obs.observe(el));\n\n// \u2500\u2500\u2500 Second child toggle\ndocument.querySelectorAll('input[name=\"hasSecond\"]').forEach(r => {\n  r.addEventListener('change', () => {\n    const open = document.getElementById('secYes').checked;\n    document.getElementById('secondChild').classList.toggle('open', open);\n    if(!open){ document.getElementById('c2name').value=''; document.getElementById('c2age').value=''; }\n  });\n});\n\n// \u2500\u2500\u2500 Remove error on input\ndocument.querySelectorAll('input').forEach(inp => {\n  inp.addEventListener('input', () => {\n    inp.classList.remove('error');\n    const e = document.getElementById('e-' + inp.id);\n    if(e) e.classList.remove('show');\n  });\n});\n\n// \u2500\u2500\u2500 Hardcoded entry IDs (extracted from Google Form source)\nconst ENTRY_MAP = {\n  parentName: 'entry.2138907829',\n  phone:      'entry.1618024410',\n  childName:  'entry.714140561',\n  childAge:   'entry.1607721215',\n  hasSecond:  'entry.2037258706',\n  c2name:     'entry.730054956',\n  c2age:      'entry.252038383',\n  lineId:     'entry.731297285',\n};\n\n// \u2500\u2500\u2500 No need to fetch dynamically anymore\nlet entryMap = ENTRY_MAP;\n\n// \u2500\u2500\u2500 Validate helper\nfunction chk(id, eid) {\n  const el = document.getElementById(id);\n  const ok = el && el.value.trim();\n  if(!ok){ el && el.classList.add('error'); const e=document.getElementById(eid); e && e.classList.add('show'); }\n  return !!ok;\n}\n\n// \u2500\u2500\u2500 Submit\ndocument.getElementById('regForm').addEventListener('submit', async e => {\n  e.preventDefault();\n  let ok = true;\n  ok = chk('parentName','e-parentName') && ok;\n  ok = chk('phone','e-phone') && ok;\n  ok = chk('childName','e-childName') && ok;\n  ok = chk('childAge','e-childAge') && ok;\n  ok = chk('lineId','e-lineId') && ok;\n  const hasSecond = document.getElementById('secYes').checked;\n  if(hasSecond){ ok = chk('c2name','e-c2name') && ok; ok = chk('c2age','e-c2age') && ok; }\n  if(!ok){ const el=document.querySelector('.error'); if(el){const y=el.getBoundingClientRect().top+window.scrollY-100;window.scrollTo({top:y,behavior:'smooth'});} return; }\n\n  const btn = document.getElementById('submitBtn');\n  btn.classList.add('loading'); btn.disabled=true;\n\n  const vals = {\n    parentName: document.getElementById('parentName').value.trim(),\n    phone:      document.getElementById('phone').value.trim(),\n    childName:  document.getElementById('childName').value.trim(),\n    childAge:   document.getElementById('childAge').value.trim(),\n    hasSecond:  hasSecond ? '\u6709' : '\u7121',\n    c2name:     document.getElementById('c2name').value.trim(),\n    c2age:      document.getElementById('c2age').value.trim(),\n    lineId:     document.getElementById('lineId').value.trim(),\n  };\n\n  const ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLScsi2QrYACuCk8aIEebapLwlH6valusfXSaD4XV9ZfNnMkedw/formResponse';\n\n  try {\n    if(entryMap){\n      const fd = new FormData();\n      Object.entries(entryMap).forEach(([k,v]) => { if(vals[k]) fd.append(v, vals[k]); });\n      await fetch(ACTION, { method:'POST', mode:'no-cors', body:fd });\n    }\n    showSuccess();\n  } catch(err){ showSuccess(); }\n});\n\nfunction showSuccess(){\n  document.getElementById('formCard').classList.add('done');\n  const y = document.getElementById('formCard').getBoundingClientRect().top + window.scrollY - 80;\n  window.scrollTo({top:y,behavior:'smooth'});\n}\n<\/script>\n\n\n</body></html>"</script>
